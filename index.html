<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Chat Ultimate v7.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background-color: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        .container { border: 2px solid #222; background: #111; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #888; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); border-color: var(--neon); }

        textarea { width: 93%; height: 90px; margin: 10px 0; background: #000; color: var(--neon); border: 1px solid #333; padding: 12px; font-size: 16px; border-radius: 10px; outline: none; resize: none; }
        .btn-group { display: flex; gap: 8px; }
        button.action-btn { flex: 1; background: #1a1a1a; color: var(--neon); border: 1px solid var(--neon); padding: 15px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        button.action-btn:active { background: var(--neon); color: #000; transform: translateY(2px); }

        .library-section { margin-top: 30px; text-align: right; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; max-width: 850px; margin: 30px auto; }
        .symbol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 6px; max-height: 500px; overflow-y: auto; padding: 10px; border: 1px solid #1a1a1a; background: #000; border-radius: 10px; }
        .s-item { background: #111; border: 1px solid #222; padding: 10px; border-radius: 6px; color: #fff; cursor: pointer; text-align: center; font-size: 22px; }
        .s-item:hover { border-color: var(--neon); color: var(--neon); transform: scale(1.2); z-index: 10; }
        
        #toast { visibility: hidden; background: var(--neon); color: #000; padding: 12px 25px; border-radius: 50px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 2000; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadeInOut 2s; }
        @keyframes fadeInOut { 0%, 100% {opacity:0;} 20%, 80% {opacity:1;} }
    </style>
</head>

<div id="toast">تم النسخ! 📋</div>

<div class="container">
    <h1 style="text-align:center;">SECRET CHAT PRO</h1>
    
    <div class="tabs">
        <button id="b-mat" class="tab-btn active" onclick="setMode('mat')">🧪 الماتريكس</button>
        <button id="b-emo" class="tab-btn" onclick="setMode('emo')">😎 إيموجي</button>
        <button id="b-sym" class="tab-btn" onclick="setMode('sym')">👾 الرموز</button>
    </div>

    <textarea id="in" placeholder="أدخل النص (عربي/English)..."></textarea>
    <div class="btn-group">
        <button class="action-btn" onclick="run(1)">🔒 تشفير</button>
        <button class="action-btn" onclick="run(2)">🔓 فك التشفير</button>
    </div>
    <textarea id="out" readonly placeholder="النتيجة المشفرة..."></textarea>
</div>

    <h2 style="text-align:center; color:var(--neon);">مكتبة الرموز الكاملة</h2>

</div>
